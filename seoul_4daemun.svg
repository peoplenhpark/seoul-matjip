<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1020" font-family="'Gowun Dodum','Nanum Gothic','Malgun Gothic',sans-serif" font-weight="900">
  <defs>
    <filter id="sketch" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="2" seed="4" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="2.2"/>
    </filter>
    <filter id="pencil" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.06" numOctaves="2" seed="9" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.2"/>
    </filter>
    <filter id="crayon" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="3" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="3.5"/>
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
    <filter id="wash" x="-15%" y="-15%" width="130%" height="130%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="6"/>
      <feGaussianBlur stdDeviation="1"/>
    </filter>
    <radialGradient id="bg" cx="50%" cy="45%" r="80%">
      <stop offset="0%" stop-color="#fff6e0"/>
      <stop offset="55%" stop-color="#fce9c4"/>
      <stop offset="100%" stop-color="#f5d39c"/>
    </radialGradient>
    <linearGradient id="mtFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8dbb4"/>
      <stop offset="100%" stop-color="#87a878"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#c8e4f0" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#8ec6e0" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#c8e4f0" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="1020" fill="url(#bg)"/>
  <ellipse cx="100" cy="120" rx="160" ry="80" fill="#f5c080" opacity="0.18" filter="url(#wash)"/>
  <ellipse cx="1300" cy="900" rx="180" ry="90" fill="#f5a070" opacity="0.2" filter="url(#wash)"/>
  <ellipse cx="1320" cy="150" rx="130" ry="70" fill="#f0e090" opacity="0.15" filter="url(#wash)"/>

  <rect x="30" y="30" width="1340" height="960" fill="none" stroke="#6a4020" stroke-width="4" filter="url(#sketch)" opacity="0.75"/>
  <rect x="46" y="46" width="1308" height="928" fill="none" stroke="#8a6040" stroke-width="1.2" filter="url(#pencil)" opacity="0.55"/>

  <!-- 타이틀 -->
  <g filter="url(#pencil)">
    <text x="700" y="62" text-anchor="middle" font-size="34" fill="#5a3a1a">서울 4대문 안 도로 지도</text>
    <text x="700" y="88" text-anchor="middle" font-size="15" fill="#7a5a32">종로 1~6가 · 을지로 1~7가 · 세종대로 · 남대문로 · 퇴계로</text>
    <line x1="430" y1="96" x2="970" y2="96" stroke="#8a6040" stroke-width="1.5" stroke-dasharray="3 4" opacity="0.6"/>
  </g>

  <!-- 산줄기 -->
  <g filter="url(#wash)">
    <path d="M40,240 Q180,130 280,200 Q380,125 490,200 Q600,140 720,195 Q840,130 970,200 Q1100,140 1230,200 Q1320,155 1370,220 L1370,270 L40,270 Z"
          fill="url(#mtFill)" opacity="0.85"/>
  </g>
  <g stroke="#5a7a4a" stroke-width="2.5" fill="none" filter="url(#pencil)" stroke-linecap="round" opacity="0.7">
    <path d="M180,210 Q205,170 230,210"/>
    <path d="M235,215 Q260,165 290,215"/>
    <path d="M440,205 Q465,160 490,205"/>
    <path d="M500,210 Q525,170 550,210"/>
    <path d="M880,200 Q905,155 930,200"/>
    <path d="M940,210 Q960,175 980,210"/>
    <path d="M1100,210 Q1125,170 1150,210"/>
  </g>
  <g filter="url(#pencil)" fill="#3a5a2a" font-size="20">
    <text x="200" y="148">인왕산</text>
    <text x="470" y="143">북악산</text>
    <text x="940" y="148">낙산</text>
  </g>

  <!-- 한양도성 -->
  <path d="M130,290 Q75,560 230,820 Q700,920 1170,810 Q1320,550 1250,290"
        fill="none" stroke="#d87050" stroke-width="5" stroke-dasharray="14 8" filter="url(#sketch)" opacity="0.7"/>

  <!-- 4대문 -->
  <g filter="url(#sketch)">
    <rect x="540" y="250" width="72" height="26" fill="#f5d4a0" stroke="#6a4020" stroke-width="2"/>
    <polygon points="540,250 576,230 612,250" fill="#e08870" stroke="#6a4020" stroke-width="2"/>
  </g>
  <text x="618" y="272" font-size="14" fill="#5a3a1a" filter="url(#pencil)">숙정문(북)</text>

  <g filter="url(#sketch)" opacity="0.6">
    <rect x="90" y="500" width="68" height="26" fill="#f5d4a0" stroke="#6a4020" stroke-width="2" stroke-dasharray="4 3"/>
  </g>
  <text x="78" y="492" font-size="14" fill="#5a3a1a" filter="url(#pencil)">돈의문터(서)</text>

  <g filter="url(#sketch)">
    <rect x="1248" y="500" width="72" height="26" fill="#f5d4a0" stroke="#6a4020" stroke-width="2"/>
    <polygon points="1248,500 1284,480 1320,500" fill="#e08870" stroke="#6a4020" stroke-width="2"/>
  </g>
  <text x="1240" y="492" font-size="14" fill="#5a3a1a" filter="url(#pencil)">흥인지문(동)</text>

  <!-- 궁궐 -->
  <g filter="url(#sketch)">
    <rect x="440" y="295" width="190" height="120" fill="#fae8c4" stroke="#6a4020" stroke-width="2.5"/>
    <polygon points="440,295 535,255 630,295" fill="#e08870" stroke="#6a4020" stroke-width="2"/>
    <rect x="478" y="348" width="28" height="67" fill="#a87450" stroke="#6a4020" stroke-width="1.5"/>
    <rect x="564" y="348" width="28" height="67" fill="#a87450" stroke="#6a4020" stroke-width="1.5"/>
  </g>
  <text x="490" y="340" font-size="22" fill="#5a2a1a" filter="url(#pencil)">경복궁</text>

  <g filter="url(#sketch)">
    <rect x="735" y="300" width="130" height="95" fill="#fae8c4" stroke="#6a4020" stroke-width="2.5"/>
    <polygon points="735,300 800,263 865,300" fill="#e08870" stroke="#6a4020" stroke-width="2"/>
  </g>
  <text x="760" y="350" font-size="20" fill="#5a2a1a" filter="url(#pencil)">창덕궁</text>

  <g filter="url(#sketch)">
    <rect x="905" y="325" width="100" height="80" fill="#fae8c4" stroke="#6a4020" stroke-width="2.5"/>
    <polygon points="905,325 955,298 1005,325" fill="#e08870" stroke="#6a4020" stroke-width="2"/>
  </g>
  <text x="930" y="372" font-size="20" fill="#5a2a1a" filter="url(#pencil)">종묘</text>

  <!-- 광화문 -->
  <g filter="url(#sketch)">
    <rect x="530" y="420" width="50" height="32" fill="#f5d4a0" stroke="#6a4020" stroke-width="2"/>
    <polygon points="530,420 555,400 580,420" fill="#e08870" stroke="#6a4020" stroke-width="2"/>
  </g>
  <text x="588" y="442" font-size="15" fill="#5a2a1a" filter="url(#pencil)">광화문</text>

  <!-- 보조도로 (남북, 손그림 점선) -->
  <g filter="url(#pencil)" stroke="#a88858" stroke-width="3" fill="none" opacity="0.55" stroke-dasharray="10 5">
    <line x1="330" y1="290" x2="330" y2="770"/>
    <line x1="700" y1="290" x2="700" y2="770"/>
    <line x1="880" y1="290" x2="880" y2="770"/>
    <line x1="1050" y1="290" x2="1050" y2="770"/>
  </g>
  <g fill="#7a5a32" filter="url(#pencil)" font-size="13">
    <text x="305" y="285">사직로</text>
    <text x="672" y="285">돈화문로</text>
    <text x="852" y="285">창경궁로</text>
    <text x="1024" y="285">대학로</text>
  </g>

  <!-- 세종대로 (남북) -->
  <g filter="url(#crayon)">
    <rect x="540" y="285" width="36" height="470" fill="#e8c890" opacity="0.7" stroke="#6a4020" stroke-width="2"/>
  </g>
  <line x1="558" y1="290" x2="558" y2="750" stroke="#fff6e0" stroke-width="2" stroke-dasharray="12 8" filter="url(#pencil)"/>
  <text x="590" y="290" font-size="16" fill="#5a3a1a" filter="url(#pencil)">세종대로</text>

  <rect x="542" y="770" width="32" height="95" fill="#e8c890" opacity="0.7" stroke="#6a4020" stroke-width="2" filter="url(#crayon)"/>
  <text x="585" y="820" font-size="14" fill="#5a3a1a" filter="url(#pencil)">남대문로</text>

  <rect x="170" y="775" width="1060" height="22" fill="#e8c890" opacity="0.7" stroke="#6a4020" stroke-width="2" filter="url(#crayon)"/>
  <text x="90" y="790" font-size="16" fill="#5a3a1a" filter="url(#pencil)">퇴계로</text>

  <!-- 종로 랜드마크 (색띠 위) -->
  <g filter="url(#pencil)">
    <rect x="215" y="450" width="50" height="34" fill="#f0e0b0" stroke="#6a4020" stroke-width="1.8" filter="url(#sketch)"/>
    <text x="222" y="472" font-size="13" fill="#5a3a1a">교보</text>

    <rect x="270" y="450" width="60" height="34" fill="#d8dde8" stroke="#6a4020" stroke-width="1.8" filter="url(#sketch)"/>
    <text x="275" y="472" font-size="12" fill="#3a4a5a">세종문화</text>

    <circle cx="420" cy="467" r="16" fill="#d87050" stroke="#6a4020" stroke-width="2" filter="url(#sketch)"/>
    <text x="407" y="472" font-size="13" fill="#fff">종각</text>

    <circle cx="500" cy="467" r="13" fill="#9bbb7a" stroke="#6a4020" stroke-width="2" filter="url(#sketch)"/>
    <text x="518" y="472" font-size="13" fill="#3a4a2a">탑골공원</text>

    <rect x="595" y="450" width="54" height="34" fill="#e8b870" stroke="#6a4020" stroke-width="1.8" filter="url(#sketch)"/>
    <text x="598" y="472" font-size="12" fill="#5a3a1a">낙원상가</text>

    <rect x="655" y="450" width="46" height="34" fill="#d0a8e0" stroke="#6a4020" stroke-width="1.8" filter="url(#sketch)"/>
    <text x="660" y="472" font-size="13" fill="#5a3a5a">단성사</text>

    <rect x="765" y="450" width="60" height="34" fill="#c8c0a8" stroke="#6a4020" stroke-width="1.8" filter="url(#sketch)"/>
    <text x="768" y="472" font-size="13" fill="#3a3a2a">세운상가</text>

    <rect x="940" y="450" width="60" height="34" fill="#f0b050" stroke="#6a4020" stroke-width="1.8" filter="url(#sketch)"/>
    <text x="946" y="472" font-size="13" fill="#5a2a1a">광장시장</text>
  </g>

  <!-- 종로 색띠 -->
  <g filter="url(#crayon)">
    <rect x="170"  y="495" width="177" height="42" fill="#f4c078" stroke="#6a4020" stroke-width="2"/>
    <rect x="347"  y="495" width="177" height="42" fill="#ec9e55" stroke="#6a4020" stroke-width="2"/>
    <rect x="524"  y="495" width="177" height="42" fill="#d87d42" stroke="#6a4020" stroke-width="2"/>
    <rect x="701"  y="495" width="177" height="42" fill="#c06035" stroke="#6a4020" stroke-width="2"/>
    <rect x="878"  y="495" width="177" height="42" fill="#a04a2e" stroke="#6a4020" stroke-width="2"/>
    <rect x="1055" y="495" width="177" height="42" fill="#783425" stroke="#6a4020" stroke-width="2"/>
  </g>
  <text x="90" y="520" font-size="22" fill="#5a2a1a" filter="url(#pencil)">종로</text>

  <g font-size="16" fill="#fff" filter="url(#pencil)">
    <circle cx="258"  cy="516" r="14" fill="#5a2a1a" stroke="#fff6e0" stroke-width="1.5"/><text x="252" y="522">1</text>
    <circle cx="435"  cy="516" r="14" fill="#5a2a1a" stroke="#fff6e0" stroke-width="1.5"/><text x="429" y="522">2</text>
    <circle cx="612"  cy="516" r="14" fill="#5a2a1a" stroke="#fff6e0" stroke-width="1.5"/><text x="606" y="522">3</text>
    <circle cx="789"  cy="516" r="14" fill="#5a2a1a" stroke="#fff6e0" stroke-width="1.5"/><text x="783" y="522">4</text>
    <circle cx="966"  cy="516" r="14" fill="#5a2a1a" stroke="#fff6e0" stroke-width="1.5"/><text x="960" y="522">5</text>
    <circle cx="1143" cy="516" r="14" fill="#5a2a1a" stroke="#fff6e0" stroke-width="1.5"/><text x="1137" y="522">6</text>
  </g>

  <!-- 청계천 -->
  <path d="M170,605 C450,590 950,620 1230,600" stroke="url(#water)" stroke-width="14" fill="none" filter="url(#wash)"/>
  <path d="M170,605 C450,590 950,620 1230,600" stroke="#5a8aa8" stroke-width="2" fill="none" opacity="0.6" stroke-dasharray="3 5" filter="url(#pencil)"/>
  <text x="90" y="600" font-size="14" fill="#3a5a7a" filter="url(#pencil)">청계천</text>

  <!-- 을지로 랜드마크 (색띠 위) -->
  <g filter="url(#pencil)">
    <rect x="180" y="625" width="60" height="32" fill="#fae8c4" stroke="#6a4020" stroke-width="1.8" filter="url(#sketch)"/>
    <polygon points="180,625 210,610 240,625" fill="#e08870" stroke="#6a4020" stroke-width="1.5" filter="url(#sketch)"/>
    <text x="188" y="647" font-size="13" fill="#5a2a1a">덕수궁</text>

    <rect x="250" y="625" width="64" height="32" fill="#c8dce8" stroke="#6a4020" stroke-width="1.8" filter="url(#sketch)"/>
    <text x="256" y="647" font-size="13" fill="#1a4a6a">서울시청</text>

    <rect x="330" y="625" width="56" height="32" fill="#d87050" stroke="#6a4020" stroke-width="1.8" filter="url(#sketch)"/>
    <text x="335" y="647" font-size="12" fill="#fff">롯데호텔</text>

    <rect x="400" y="625" width="54" height="32" fill="#60a898" stroke="#6a4020" stroke-width="1.8" filter="url(#sketch)"/>
    <text x="406" y="647" font-size="13" fill="#fff">하나銀</text>

    <rect x="495" y="625" width="64" height="32" fill="#e8d8b0" stroke="#6a4020" stroke-width="1.8" filter="url(#sketch)"/>
    <text x="500" y="647" font-size="12" fill="#5a3a1a">한국은행</text>

    <rect x="650" y="625" width="64" height="32" fill="#e8b060" stroke="#6a4020" stroke-width="1.8" filter="url(#sketch)"/>
    <text x="655" y="647" font-size="12" fill="#5a2a1a">중부시장</text>

    <rect x="800" y="625" width="64" height="32" fill="#b89868" stroke="#6a4020" stroke-width="1.8" filter="url(#sketch)"/>
    <text x="806" y="647" font-size="12" fill="#fff">방산시장</text>

    <rect x="945" y="625" width="64" height="32" fill="#e8a070" stroke="#6a4020" stroke-width="1.8" filter="url(#sketch)"/>
    <text x="954" y="647" font-size="13" fill="#5a2a1a">오장동</text>

    <ellipse cx="1095" cy="641" rx="45" ry="18" fill="#b0a8c0" stroke="#6a4020" stroke-width="1.8" filter="url(#sketch)"/>
    <text x="1080" y="646" font-size="15" fill="#fff">DDP</text>

    <rect x="1155" y="625" width="48" height="32" fill="#4a4a5a" stroke="#6a4020" stroke-width="1.8" filter="url(#sketch)"/>
    <text x="1163" y="647" font-size="13" fill="#fff">두타</text>
  </g>

  <!-- 을지로 색띠 -->
  <g filter="url(#crayon)">
    <rect x="170"  y="665" width="151" height="38" fill="#bed8e8" stroke="#6a4020" stroke-width="2"/>
    <rect x="321"  y="665" width="151" height="38" fill="#9cbed4" stroke="#6a4020" stroke-width="2"/>
    <rect x="472"  y="665" width="152" height="38" fill="#78a4c0" stroke="#6a4020" stroke-width="2"/>
    <rect x="624"  y="665" width="152" height="38" fill="#5c8aa8" stroke="#6a4020" stroke-width="2"/>
    <rect x="776"  y="665" width="152" height="38" fill="#426d8a" stroke="#6a4020" stroke-width="2"/>
    <rect x="928"  y="665" width="152" height="38" fill="#304e6a" stroke="#6a4020" stroke-width="2"/>
    <rect x="1080" y="665" width="152" height="38" fill="#1e3450" stroke="#6a4020" stroke-width="2"/>
  </g>
  <text x="90" y="690" font-size="22" fill="#1e3450" filter="url(#pencil)">을지로</text>

  <g font-size="15" filter="url(#pencil)">
    <circle cx="246"  cy="684" r="13" fill="#1e3450" stroke="#fff6e0" stroke-width="1.5"/><text x="241" y="690" fill="#fff">1</text>
    <circle cx="397"  cy="684" r="13" fill="#1e3450" stroke="#fff6e0" stroke-width="1.5"/><text x="392" y="690" fill="#fff">2</text>
    <circle cx="548"  cy="684" r="13" fill="#1e3450" stroke="#fff6e0" stroke-width="1.5"/><text x="543" y="690" fill="#fff">3</text>
    <circle cx="700"  cy="684" r="13" fill="#1e3450" stroke="#fff6e0" stroke-width="1.5"/><text x="695" y="690" fill="#fff">4</text>
    <circle cx="852"  cy="684" r="13" fill="#fff6e0" stroke="#1e3450" stroke-width="2"/><text x="847" y="690" fill="#1e3450">5</text>
    <circle cx="1004" cy="684" r="13" fill="#fff6e0" stroke="#1e3450" stroke-width="2"/><text x="999" y="690" fill="#1e3450">6</text>
    <circle cx="1156" cy="684" r="13" fill="#fff6e0" stroke="#1e3450" stroke-width="2"/><text x="1151" y="690" fill="#1e3450">7</text>
  </g>

  <!-- 명동 -->
  <circle cx="570" cy="738" r="18" fill="#e07a92" stroke="#6a4020" stroke-width="2" filter="url(#sketch)"/>
  <text x="557" y="744" font-size="14" fill="#fff" filter="url(#pencil)">명동</text>

  <!-- 남대문시장·신세계 -->
  <g filter="url(#sketch)">
    <rect x="595" y="810" width="68" height="34" fill="#f0b050" stroke="#6a4020" stroke-width="1.8"/>
    <rect x="515" y="810" width="76" height="34" fill="#2a2a2a" stroke="#6a4020" stroke-width="1.8"/>
  </g>
  <text x="602" y="832" font-size="12" fill="#5a2a1a" filter="url(#pencil)">남대문시장</text>
  <text x="522" y="832" font-size="12" fill="#fff6e0" filter="url(#pencil)">신세계百</text>

  <!-- 숭례문 -->
  <g filter="url(#sketch)">
    <rect x="510" y="865" width="100" height="32" fill="#f5d4a0" stroke="#6a4020" stroke-width="2"/>
    <polygon points="510,865 560,840 610,865" fill="#e08870" stroke="#6a4020" stroke-width="2"/>
  </g>
  <text x="620" y="888" font-size="15" fill="#5a2a1a" filter="url(#pencil)">숭례문(남대문)</text>

  <!-- 꽃 포인트 -->
  <g filter="url(#wash)">
    <circle cx="240" cy="420" r="11" fill="#e8a0a8" opacity="0.65"/>
    <circle cx="1180" cy="420" r="11" fill="#e8a0a8" opacity="0.65"/>
    <circle cx="150" cy="760" r="10" fill="#f0c878" opacity="0.6"/>
    <circle cx="1265" cy="780" r="10" fill="#a8c890" opacity="0.7"/>
  </g>

  <!-- 나침반 -->
  <g transform="translate(1310,320)" filter="url(#pencil)">
    <circle r="32" fill="#fff6e0" stroke="#6a4020" stroke-width="2.5" opacity="0.95"/>
    <polygon points="0,-24 7,0 0,24 -7,0" fill="#d87050" stroke="#6a4020" stroke-width="1.5"/>
    <text x="-7" y="-38" font-size="16" fill="#5a2a1a">N</text>
  </g>

  <!-- ===== 암기 박스 (하단 전체 폭) ===== -->
  <g transform="translate(60,910)" filter="url(#pencil)">
    <rect width="1280" height="80" fill="#fff2d0" opacity="0.92" stroke="#6a4020" stroke-width="2" filter="url(#sketch)"/>
    <text x="18" y="28" font-size="17" fill="#5a3a1a">"N가(街)" 구간 암기 포인트</text>

    <text x="18" y="52" font-size="13" fill="#5a2a1a"><tspan fill="#6a3a1a">종로</tspan> ① 광화문·교보 → ② 종각·탑골 → ③ 낙원·단성사·종묘 → ④ 세운상가 → ⑤ 광장시장 → ⑥ 동대문</text>
    <text x="18" y="72" font-size="13" fill="#5a2a1a"><tspan fill="#1e3450">을지로</tspan> ① 롯데·시청 → ② 하나銀 → ③ 한국은행·명동 → ④ 중부시장 → ⑤ 방산시장 → ⑥ 오장동 → ⑦ DDP·두타</text>
  </g>
